# =============================================================================
# Integration test: java/build component
#
# This pipeline tests the java/build component with a sample Java project.
# It verifies that:
#   - Dependencies are resolved correctly
#   - JAR file is produced
#   - Stages are prescribed correctly
# =============================================================================

stages:
  - install
  - build
  - verify

include:
  - local: /templates/build.yml
    inputs:
      java_version: "25"

# Verify the build produced expected artifacts
verify-jar-produced:
  stage: verify
  needs:
    - job: "java::build::package"
      artifacts: true
  script:
    - |
      echo "Verifying JAR was produced..."
      if ls target/*.jar 1>/dev/null 2>&1; then
        echo "SUCCESS: JAR file found"
        ls -la target/*.jar
      else
        echo "FAILURE: No JAR file found in target/"
        exit 1
      fi
