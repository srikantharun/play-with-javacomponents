spec:
  component: [name, sha, version]
  inputs:
    java_version:
      default: "25"
      description: "Java version"
      options: ["21", "25"]
      type: string
    use_wiremock:
      default: true
      description: "Use Wiremock for API mocking in integration tests"
      type: boolean
    # Standard Component inputs
    component_context_dir:
      default: "./"
      description: "Working directory in which this Component will execute"
      regex: ^([a-z.][a-zA-Z0-9-_/]+)?$
      type: string
    job_name_prefix:
      default: ""
      description: "Prefix for all component jobs"
      regex: ^([a-z][a-z0-9-]+::)*$
      type: string
    job_stage:
      default: "integration-test"
      description: "Pipeline stage in which jobs are run"
      type: string
---
include:
  - local: /templates/shared/common.yml
    inputs:
      component_context_dir: "$[[ inputs.component_context_dir ]]"
      job_name_prefix: "$[[ inputs.job_name_prefix ]]"
      job_stage: "$[[ inputs.job_stage ]]"
      _component_image: "$CI_TEMPLATE_REGISTRY_HOST/dwp/engineering/pipeline-solutions/gitlab/components/java:$[[ component.sha ]]-jdk$[[ inputs.java_version ]]"
  # Include wiremock and api-tests functions from external project
  - project: dwp/engineering/pipeline-solutions/gitlab/functions
    ref: 7.1.6
    file:
      - functions/wiremock-mr.gitlab-ci.yml
      - functions/api-tests-mr.gitlab-ci.yml

variables:
  DISABLE_WIREMOCK: "$[[ inputs.use_wiremock | then: 'false', else: 'true' ]]"

# Wiremock integration test
"$[[ inputs.job_name_prefix ]]java::api-test::wiremock":
  artifacts:
    expire_in: 1 week
    paths:
      - $[[ inputs.component_context_dir ]]/target/wiremock-reports/
    when: always
  cache:
    key: "${CI_JOB_NAME}-$[[ inputs.java_version ]]"
    paths:
      - $[[ inputs.component_context_dir ]]/.m2-local/
    when: always
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  needs:
    - job: "$[[ inputs.job_name_prefix ]]java::build::package"
      optional: true
  rules:
    - if: '"$[[ inputs.use_wiremock ]]" == "true"'
  script: |
    echo "Running Wiremock integration tests..."
    mvn verify -Pwiremock \
      -Dmaven.repo.local=.m2-local \
      -s /component/shared/settings.xml
