spec:
  component: [name, sha, version]
  inputs:
    java_version:
      default: "25"
      description: "Java version"
      options: ["21", "25"]
      type: string
    run_verify:
      default: true
      description: "Run maven verify (integration tests)"
      type: boolean
    # Standard Component inputs
    component_context_dir:
      default: "./"
      description: "Working directory in which this Component will execute"
      regex: ^([a-z.][a-zA-Z0-9-_/]+)?$
      type: string
    job_name_prefix:
      default: ""
      description: "Prefix for all component jobs"
      regex: ^([a-z][a-z0-9-]+::)*$
      type: string
    job_stage_unit_test:
      default: "unit-test"
      description: "Pipeline stage for unit tests"
      type: string
    job_stage_integration_test:
      default: "integration-test"
      description: "Pipeline stage for integration tests"
      type: string
---
include:
  - local: /templates/shared/common.yml
    inputs:
      component_context_dir: "$[[ inputs.component_context_dir ]]"
      job_name_prefix: "$[[ inputs.job_name_prefix ]]"
      job_stage: "$[[ inputs.job_stage_unit_test ]]"
      _component_image: "$CI_TEMPLATE_REGISTRY_HOST/dwp/engineering/pipeline-solutions/gitlab/components/java:$[[ component.sha ]]-jdk$[[ inputs.java_version ]]"

# Maven test - unit tests
"$[[ inputs.job_name_prefix ]]java::test::unit":
  artifacts:
    expire_in: 1 week
    paths:
      - $[[ inputs.component_context_dir ]]/target/surefire-reports/
    reports:
      junit: $[[ inputs.component_context_dir ]]/target/surefire-reports/*.xml
    when: always
  cache:
    key: "${CI_JOB_NAME}-$[[ inputs.java_version ]]"
    paths:
      - $[[ inputs.component_context_dir ]]/.m2-local/
    when: always
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  stage: $[[ inputs.job_stage_unit_test ]]
  script: |
    mvn test \
      -Dmaven.repo.local=.m2-local \
      -s /component/shared/settings.xml

# Maven verify - integration tests
"$[[ inputs.job_name_prefix ]]java::test::integration":
  artifacts:
    expire_in: 1 week
    paths:
      - $[[ inputs.component_context_dir ]]/target/failsafe-reports/
    reports:
      junit: $[[ inputs.component_context_dir ]]/target/failsafe-reports/*.xml
    when: always
  cache:
    key: "${CI_JOB_NAME}-$[[ inputs.java_version ]]"
    paths:
      - $[[ inputs.component_context_dir ]]/.m2-local/
    when: always
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  needs:
    - job: "$[[ inputs.job_name_prefix ]]java::build::package"
      optional: true
  rules:
    - if: '"$[[ inputs.run_verify ]]" == "true"'
  stage: $[[ inputs.job_stage_integration_test ]]
  script: |
    mvn verify -DskipUnitTests \
      -Dmaven.repo.local=.m2-local \
      -s /component/shared/settings.xml
