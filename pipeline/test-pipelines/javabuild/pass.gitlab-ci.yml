# =============================================================================
# Integration test: java/build component - PASS scenario
#
# Tests that a valid Java project builds successfully and produces a JAR.
# =============================================================================

spec:
  inputs:
    java_version:
      default: "25"
      type: string

stages:
  - install
  - build
  - verify

include:
  - local: /templates/build.yml
    inputs:
      java_version: $[[ inputs.java_version ]]
      component_context_dir: "pipeline/test-pipelines/fixtures/pass"

verify-jar-produced:
  stage: verify
  needs:
    - job: "java::build::package"
      artifacts: true
  script:
    - |
      echo "Verifying JAR was produced..."
      if ls pipeline/test-pipelines/fixtures/pass/target/*.jar 1>/dev/null 2>&1; then
        echo "SUCCESS: JAR file found"
        ls -la pipeline/test-pipelines/fixtures/pass/target/*.jar
      else
        echo "FAILURE: No JAR file found"
        exit 1
      fi
