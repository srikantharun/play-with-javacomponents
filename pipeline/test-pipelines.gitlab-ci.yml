# =============================================================================
# Integration tests - run components in real GitLab pipelines
#
# Tests all components (lint, javabuild, etc.) across Java versions.
# =============================================================================

test-pipelines:
  interruptible: true
  needs: [build-component-image]
  parallel:
    matrix:
      - TEST_PATH:
          - lint/pass
          - lint/fail
          - javabuild/pass
          - javabuild/fail
        JAVA_VERSION:
          - 21
          - 25
  stage: test-pipelines
  trigger:
    include:
      - local: pipeline/test-pipelines/$TEST_PATH.gitlab-ci.yml
        inputs:
          java_version: "$JAVA_VERSION"
    strategy: depend
