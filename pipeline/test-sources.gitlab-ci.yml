# =============================================================================
# Unit tests using BATS for component shell scripts
# =============================================================================

test-sources:
  stage: test
  image: bats/bats:latest
  script:
    - bats tests/
  rules:
    - changes:
        - src/**/*.sh
        - tests/**/*.bats
  artifacts:
    when: always
    reports:
      junit: tests/report.xml
